<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sesuatu Buat Kamu</title>
    <!-- Import Font Estetik -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #ff3366;
            --bg-color: #050510;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at center, #1a0b2e 0%, var(--bg-color) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* Animasi Bintang di Background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: transparent url('https://cdn.pixabay.com/photo/2016/01/27/15/25/space-1164579_960_720.png') repeat top center;
            animation: move-twink-back 200s linear infinite;
            opacity: 0.3;
        }

        @keyframes move-twink-back {
            from {background-position: 0 0;}
            to {background-position: -10000px 5000px;}
        }

        /* Glassmorphism Card Container */
        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; /* Nah ini yang bener bro! */
            padding: 40px;
            width: 90%;
            max-width: 600px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .glass-card.expanded {
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 50px rgba(255, 51, 102, 0.15);
        }

        /* SVG Surat Cinta Button dengan Neon Glow */
        .mail-svg {
            width: 80px;
            height: 80px;
            fill: none;
            stroke: var(--primary-glow);
            stroke-width: 1.5; 
            cursor: pointer;
            filter: drop-shadow(0 0 10px var(--primary-glow));
            animation: heartbeat 1.5s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        .mail-svg:hover {
            filter: drop-shadow(0 0 25px var(--primary-glow));
            transform: scale(1.1);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.15); }
            28% { transform: scale(1); }
            42% { transform: scale(1.15); }
            70% { transform: scale(1); }
        }

        .instruction {
            margin-top: 20px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            transition: opacity 0.5s ease;
        }

        /* Styling Teks Pesan */
        #message-container {
            display: none;
            text-align: center;
            width: 100%;
        }

        .greeting {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: var(--primary-glow);
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.4);
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s forwards 0.5s;
        }

        .typed-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #e0e0e0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes fadeInDown {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Partikel yang lebih smooth */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, #fff, var(--primary-glow));
            box-shadow: 0 0 10px var(--primary-glow);
            animation: floatAway 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes floatAway {
            0% { transform: scale(1) translate(0, 0); opacity: 1; }
            100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <!-- Ganti nama 'lagu-romantis.mp3' dengan nama file lagu yang lu punya -->
    <audio id="bgMusic" loop>
        <source src="lagu-romantis.mp3" type="audio/mpeg">
    </audio>

    <div class="glass-card" id="card">
        
        <!-- Icon Surat Cinta dengan Segel Hati -->
        <svg id="startBtn" class="mail-svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <!-- Outline Amplop -->
            <rect x="3" y="6" width="18" height="14" rx="2"></rect>
            <path d="M3 8l8.3 5.5c.4.3 1 .3 1.4 0L21 8"></path>
            <!-- Segel Hati di tengah -->
            <path d="M12 15.5l-2.6-2.4c-.5-.5-.8-1.2-.9-1.9-.1-1 .7-1.8 1.7-1.8.5 0 .9.2 1.3.6.3-.4.8-.6 1.3-.6 1 0 1.8.8 1.7 1.8-.1.7-.4 1.4-.9 1.9L12 15.5z" fill="var(--primary-glow)" stroke="none"></path>
        </svg>

        <p id="instruction" class="instruction">(Coba Klik Ka)</p>

        <div id="message-container">
            <div class="greeting">Today...</div>
            <div id="message" class="typed-text"></div>
        </div>

    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const instruction = document.getElementById('instruction');
        const messageContainer = document.getElementById('message-container');
        const messageDiv = document.getElementById('message');
        const card = document.getElementById('card');
        const bgMusic = document.getElementById('bgMusic');
        
        // Teks asli lu terpasang di sini
        const ungkapanHati = "Aku tau bukan orang yang paling jago dalam merangkai kata. Terkadang diam bukan karena nggak peduli, tapi karena bingung gimana cara nyampeinnya. Tapi lewat layar ini mau bilang : Perasaan itu nyata udah dari lama, lebih hidup dari sekadar teks biasa. Rasa nya senang sekali bisa ngerasakan ini lagi, Terima kasih ka udah ada sampe hari ini dan makasih juga untuk segala hal, aku mencintai orang-orang yang menjadi diri nya sendiri. Teruslah berkembang ka dimana pun tempat, jangn sampe patah semangat 🙂";
        
        let i = 0;
        let isTyping = false;

        function typeWriter() {
            if (i < ungkapanHati.length) {
                messageDiv.innerHTML += ungkapanHati.charAt(i);
                i++;
                // Randomize typing speed for realistic effect
                let typingSpeed = Math.random() * (120 - 50) + 50; 
                setTimeout(typeWriter, typingSpeed); 
            }
        }

        function createMagicParticles(x, y) {
            for (let j = 0; j < 40; j++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 6 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 200 + 50;
                particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                
                document.body.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1500);
            }
        }

        startBtn.addEventListener('click', (e) => {
            if (isTyping) return;
            isTyping = true;
            
            // Putar lagu
            bgMusic.play().catch(err => console.log("Audio info:", err));
            
            // Efek partikel
            const rect = startBtn.getBoundingClientRect();
            createMagicParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);

            // Transisi UI Front-end yang smooth
            startBtn.classList.add('fade-out');
            instruction.classList.add('fade-out');
            
            setTimeout(() => {
                startBtn.style.display = 'none';
                instruction.style.display = 'none';
                card.classList.add('expanded');
                messageContainer.style.display = 'block';
                
                // Mulai ngetik setelah kartu membesar
                setTimeout(typeWriter, 1200);
            }, 500); // Nunggu fade out selesai
        });
    </script>
</body>
</html>
