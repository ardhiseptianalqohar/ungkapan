<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sesuatu Buat Kamu</title>
    <!-- Import Font Estetik -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #ff3366;
            --bg-color: #050510;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Ganti height ke min-height biar kalau di scroll nggak kepotong background-nya */
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a0b2e 0%, var(--bg-color) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            /* Jangan overflow hidden di body, biar bisa scroll di HP */
            overflow-x: hidden; 
            padding: 20px 0;
        }

        /* Animasi Bintang di Background */
        .stars {
            position: fixed; /* Ubah ke fixed biar pas di scroll bintangnya stay */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: transparent url('https://cdn.pixabay.com/photo/2016/01/27/15/25/space-1164579_960_720.png') repeat top center;
            animation: move-twink-back 200s linear infinite;
            opacity: 0.3;
        }

        @keyframes move-twink-back {
            from {background-position: 0 0;}
            to {background-position: -10000px 5000px;}
        }

        /* Glassmorphism Card Container */
        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px; /* Sedikit dikecilkan biar nggak sempit di HP */
            width: 90%;
            max-width: 600px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin: auto; /* Biar center */
        }

        /* Tambahan buat handle text panjang di mobile */
        .glass-card.expanded {
            padding: 40px 25px;
            height: auto; /* Biar kartu memanjang ngikutin teks */
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 50px rgba(255, 51, 102, 0.15);
        }

        .mail-svg {
            width: 80px;
            height: 80px;
            fill: none;
            stroke: var(--primary-glow);
            stroke-width: 1.5; 
            cursor: pointer;
            filter: drop-shadow(0 0 10px var(--primary-glow));
            animation: heartbeat 1.5s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.15); }
            28% { transform: scale(1); }
            42% { transform: scale(1.15); }
            70% { transform: scale(1); }
        }

        .instruction {
            margin-top: 20px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            transition: opacity 0.5s ease;
        }

        #message-container {
            display: none;
            text-align: center;
            width: 100%;
        }

        .greeting {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: var(--primary-glow);
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.4);
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 1s forwards 0.5s;
        }

        .typed-text {
            font-size: 1rem; /* Ukuran teks lebih pas buat HP */
            line-height: 1.6;
            color: #e0e0e0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            word-wrap: break-word; /* Biar kata nggak ngelewati batas kartu */
        }

        @keyframes fadeInDown {
            to { opacity: 1; transform: translateY(0); }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, #fff, var(--primary-glow));
            box-shadow: 0 0 10px var(--primary-glow);
            animation: floatAway 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 100;
        }

        @keyframes floatAway {
            0% { transform: scale(1) translate(0, 0); opacity: 1; }
            100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Perbaikan khusus layar kecil */
        @media (max-width: 480px) {
            .glass-card { padding: 25px 20px; }
            .greeting { font-size: 1.8rem; }
            .typed-text { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <audio id="bgMusic" loop>
        <source src="lagu-romantis.mp3" type="audio/mpeg">
    </audio>

    <div class="glass-card" id="card">
        <svg id="startBtn" class="mail-svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="6" width="18" height="14" rx="2"></rect>
            <path d="M3 8l8.3 5.5c.4.3 1 .3 1.4 0L21 8"></path>
            <path d="M12 15.5l-2.6-2.4c-.5-.5-.8-1.2-.9-1.9-.1-1 .7-1.8 1.7-1.8.5 0 .9.2 1.3.6.3-.4.8-.6 1.3-.6 1 0 1.8.8 1.7 1.8-.1.7-.4 1.4-.9 1.9L12 15.5z" fill="var(--primary-glow)" stroke="none"></path>
        </svg>

        <p id="instruction" class="instruction">(Coba Klik Ka)</p>

        <div id="message-container">
            <div class="greeting">Today...</div>
            <div id="message" class="typed-text"></div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const instruction = document.getElementById('instruction');
        const messageContainer = document.getElementById('message-container');
        const messageDiv = document.getElementById('message');
        const card = document.getElementById('card');
        const bgMusic = document.getElementById('bgMusic');
        
        const ungkapanHati = "Aku tau bukan orang yang paling jago dalam merangkai kata. Terkadang diam bukan karena nggak peduli, tapi karena bingung gimana cara nyampeinnya. Tapi lewat layar ini mau bilang : Perasaan itu nyata udah dari lama, lebih hidup dari sekadar teks biasa. Rasa nya senang sekali bisa ngerasakan ini lagi, Terima kasih ka udah ada sampe hari ini dan makasih juga untuk segala hal, aku mencintai orang-orang yang menjadi diri nya sendiri. Teruslah berkembang ka dimana pun tempat, jangn sampe patah semangat 🙂";
        
        let i = 0;
        let isTyping = false;

        function typeWriter() {
            if (i < ungkapanHati.length) {
                messageDiv.innerHTML += ungkapanHati.charAt(i);
                i++;
                let typingSpeed = Math.random() * (100 - 40) + 40; 
                setTimeout(typeWriter, typingSpeed); 
            }
        }

        function createMagicParticles(x, y) {
            for (let j = 0; j < 30; j++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 150 + 50;
                particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                document.body.appendChild(particle);
                setTimeout(() => { particle.remove(); }, 1500);
            }
        }

        startBtn.addEventListener('click', (e) => {
            if (isTyping) return;
            isTyping = true;
            
            bgMusic.play().catch(err => console.log("Audio info:", err));
            
            const rect = startBtn.getBoundingClientRect();
            createMagicParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);

            startBtn.classList.add('fade-out');
            instruction.classList.add('fade-out');
            
            setTimeout(() => {
                startBtn.style.display = 'none';
                instruction.style.display = 'none';
                card.classList.add('expanded');
                messageContainer.style.display = 'block';
                setTimeout(typeWriter, 800);
            }, 500);
        });
    </script>
</body>
</html>
